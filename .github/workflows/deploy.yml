name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: auto-merge-analyzer-dashboard/package-lock.json

    - name: Install dependencies
      working-directory: auto-merge-analyzer-dashboard
      run: npm ci

    - name: Build application
      working-directory: auto-merge-analyzer-dashboard
      run: npm run build
      env:
        CI: false
        REACT_APP_GITHUB_TOKEN: ${{ secrets.WORKFLOW_GITHUB_TOKEN }}

    - name: Prepare deployment
      run: |
        mkdir -p _site/auto-merge-analyzer-dashboard
        cp -r auto-merge-analyzer-dashboard/build/* _site/auto-merge-analyzer-dashboard/

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4